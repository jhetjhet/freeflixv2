services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file: .env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - freeflix_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./freeflix-react
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
      - node_backend
    
  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mysql
    volumes:
      - ${MEDIA_ROOT}:/app/media
      - ./staticfiles:/app/staticfiles

  node_backend:
    build:
      context: ./node-media-server
    depends_on:
      - backend
    volumes:
      - ${MEDIA_ROOT}:/app/media
    environment:
      - PORT=8080
      - DJANGO_URL_PATH=http://web-server
      - ENV_MODE=production

  web-server: # for RFC 1034 / 1035 compliant hostname resolution
    image: nginx
    restart: unless-stopped
    depends_on:
      - backend
      - node_backend
      - frontend
    volumes:
      - ./nginx-server/includes:/etc/nginx/includes
      - ./staticfiles:/usr/share/nginx/html/static
      - ${MEDIA_ROOT}:/usr/share/nginx/media
    ports:
      - 127.0.0.1:8080:80

volumes:
  freeflix_mysql_data: