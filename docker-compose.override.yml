services:
  frontend:
    build:
      context: ./freeflix-react
      target: build
    env_file:
      - ./freeflix-react/.env.development
    volumes:
      - ./freeflix-react:/app
      - /app/node_modules
    develop:
      watch:
        - action: rebuild
          path: ./freeflix-react/package.json
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: ["npm", "start"]
  
  backend:
    develop:
      watch:
        - action: sync
          path: .
          initial_sync: true
          target: /app
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"

  node_room_cleanup:
    volumes:
      - ./node-media-server:/app
      - /app/node_modules
    develop:
      watch:
        - action: rebuild
          path: ./node-media-server/package.json

  node_backend:
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true 
    volumes:
      - ./node-media-server:/app
      - /app/node_modules
    develop:
      watch:
        - action: rebuild
          path: ./node-media-server/package.json
    command: npm start
    ports:
        - "8080:8080"

  web-server:
    volumes:
      - ./nginx-server/config.dev.conf:/etc/nginx/conf.d/default.conf