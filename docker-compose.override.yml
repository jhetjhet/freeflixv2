services:
  frontend:
    build:
      context: ./freeflix-react
      target: build
    container_name: freeflix-frontend-dev
    env_file:
      - ./freeflix-react/.env.development
    develop:
      watch:
        - action: sync
          path: ./freeflix-react
          target: /app
          initial_sync: true
          ignore:
            - node_modules/
        - action: rebuild
          path: ./freeflix-react/package.json
    stdin_open: true
    tty: true
    command: ["npm", "start"]
  
  backend:
    container_name: freeflix-backend-dev
    develop:
      watch:
        - action: sync
          path: .
          initial_sync: true
          target: /app
    command: python manage.py runserver 0.0.0.0:8000

  node_backend:
    container_name: freeflix-node-backend-dev
    environment:
      - ENV_MODE=development
    develop:
      watch:
        - action: sync
          path: ./node-media-server
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./node-media-server/package.json
    command: node index.js

  web_server:
    volumes:
      - ./nginx-server/config.dev.conf:/etc/nginx/conf.d/default.conf