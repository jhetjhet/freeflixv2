
services:
  next-app:
    image: snits/fooflix-next:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_API_BASE=${TMDB_BASE_URL}
      - NODE_SOCKET_URL=${NODE_SOCKET_URL}
      - NODE_SOCKET_PATH=${NODE_SOCKET_PATH}
      - NODE_EXT_API_URL=${NODE_EXT_API_URL}
      - NODE_API_URL=${NODE_API_URL}
      - DJANGO_API_URL=${DJANGO_API_URL}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - COOKIE_MAX_AGE=${COOKIE_MAX_AGE}
      - NODE_SERVICE_TOKEN=${NODE_SERVICE_TOKEN}
    depends_on:
      - backend
      - node_backend
    expose:
      - 3000

  web-server:
    volumes:
      - ./nginx-server/config.next.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 127.0.0.1:${WEB_SERVER_NEXT_PORT:-3000}:3000