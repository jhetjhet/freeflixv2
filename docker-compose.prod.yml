
services:
  frontend:
    container_name: freeflix-frontend
    volumes:
      - frontend_build:/app/build
    command: npm run build

  backend:
    image: snits/freeflix-django:${FREEFLIX_DJANGO_VERSION:-latest}
    build: !reset null
    container_name: freeflix-backend
    env_file:
      - .env
    command: gunicorn freeflix.wsgi:application -b 0.0.0.0:8000

  node_backend:
    command: pm2-runtime start index.js --name node-media-server

  web_server:
    volumes:
      - ./nginx-server/config.conf:/etc/nginx/conf.d/default.conf